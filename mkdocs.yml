site_name: kaloricketabulky-sdk
site_description: Typesafe async read-only SDK for the kaloricketabulky.cz internal API.
site_url: https://tomasvotava.github.io/kaloricketabulky/
repo_url: https://github.com/tomasvotava/kaloricketabulky
repo_name: tomasvotava/kaloricketabulky
copyright: Copyright &copy; Tomas Votava

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true

plugins:
  - search
  - gen-files:
      scripts:
        - docs/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - section-index
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            extensions:
              - griffe_pydantic:
                  schema: false
            docstring_style: google
            docstring_section_style: table
            show_source: true
            show_root_heading: true
            show_root_full_path: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            separate_signature: true
            signature_crossrefs: true
            merge_init_into_class: true
            filters:
              - "!^_"

exclude_docs: |
  gen_ref_pages.py
  superpowers/

nav:
  - Home: index.md
  - Usage: usage.md
  - API reference: reference/

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/tomasvotava/kaloricketabulky
