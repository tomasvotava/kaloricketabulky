name: docs

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

env:
  # Silence the mkdocs-material promotional "MkDocs 2.0 / ProperDocs" banner so it
  # does not fail the strict build. mkdocs core honours DISABLE_MKDOCS_2_WARNING;
  # the mkdocs-material banner checks NO_MKDOCS_2_WARNING.
  DISABLE_MKDOCS_2_WARNING: "true"
  NO_MKDOCS_2_WARNING: "true"

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        name: Checkout
      - uses: astral-sh/setup-uv@v7
        name: Install uv
        with:
          enable-cache: true
          python-version: "3.13"
      - name: Install docs dependencies
        run: uv sync --locked --group docs
      - name: Build site (strict)
        run: uv run mkdocs build --strict --site-dir site
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
